# Local profile for running app without PostgreSQL

spring.datasource.url=jdbc:h2:mem:goodthingjar;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Let Hibernate create schema in-memory for local smoke runs
spring.jpa.hibernate.ddl-auto=create-drop
spring.flyway.enabled=false

# Keep logs readable while iterating locally
logging.level.org.hibernate.SQL=INFO

