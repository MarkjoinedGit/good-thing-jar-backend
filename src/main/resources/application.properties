# -----------------------------
# App identity
# -----------------------------
# Load local .env from common launch directories (backend root or workspace root)
spring.config.import=optional:file:.env[.properties],optional:file:./.env[.properties],optional:file:${user.dir}/.env[.properties],optional:file:${user.dir}/good-thing-jar-backend/.env[.properties]
spring.application.name=good-thing-jar-backend
server.port=${SERVER_PORT:8080}
spring.profiles.active=${APP_ENV:dev}

# -----------------------------
# Database (PostgreSQL + HikariCP)
# -----------------------------
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/good_thing_jar_dev}
spring.datasource.username=${DATABASE_USERNAME:jar_user}
spring.datasource.password=${DATABASE_PASSWORD:dev_password}
spring.datasource.driver-class-name=org.postgresql.Driver

# Hikari tuning (from performance goals in specs/research)
spring.datasource.hikari.pool-name=GoodThingJarHikariPool
spring.datasource.hikari.maximum-pool-size=${DB_MAX_POOL_SIZE:20}
spring.datasource.hikari.minimum-idle=${DB_MIN_IDLE:5}
spring.datasource.hikari.connection-timeout=${DB_CONNECTION_TIMEOUT_MS:30000}
spring.datasource.hikari.idle-timeout=${DB_IDLE_TIMEOUT_MS:600000}
spring.datasource.hikari.max-lifetime=${DB_MAX_LIFETIME_MS:1800000}
spring.datasource.hikari.validation-timeout=${DB_VALIDATION_TIMEOUT_MS:5000}

# -----------------------------
# JPA / Hibernate
# -----------------------------
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.show-sql=false

# -----------------------------
# Flyway migrations
# -----------------------------
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# -----------------------------
# Security - JWT
# Spec: 24h access token, optional refresh token
# -----------------------------
app.security.jwt.secret=${JWT_SECRET}
app.security.jwt.access-token-expiry-seconds=${JWT_EXPIRY:86400}
app.security.jwt.refresh-token-expiry-seconds=${JWT_REFRESH_EXPIRY:604800}
app.security.jwt.issuer=${JWT_ISSUER:good-thing-jar}

# -----------------------------
# Encryption (AES-256 at rest requirement)
# -----------------------------
app.encryption.algorithm=${ENCRYPTION_ALGORITHM:AES}
app.encryption.key=${ENCRYPTION_KEY}

# -----------------------------
# Core business rules from spec
# -----------------------------
app.pairing.code-expiry-hours=${PAIRING_CODE_EXPIRY_HOURS:24}
app.jar.default-unlock.month=${JAR_DEFAULT_UNLOCK_MONTH:12}
app.jar.default-unlock.day=${JAR_DEFAULT_UNLOCK_DAY:31}
app.jar.unlock-proposal-expiry-days=${UNLOCK_PROPOSAL_EXPIRY_DAYS:7}
app.audit.retention-days=${AUDIT_RETENTION_DAYS:90}
app.entry.max-content-length=${ENTRY_MAX_CONTENT_LENGTH:10000}
app.entry.offline-sync.max-batch-size=${ENTRY_SYNC_MAX_BATCH_SIZE:100}

# -----------------------------
# Notifications (push only, per spec)
# -----------------------------
app.notifications.enabled=${NOTIFICATIONS_ENABLED:true}
app.notifications.provider=${NOTIFICATION_PROVIDER:firebase}
app.notifications.default-local-time=${NOTIFICATION_DEFAULT_TIME:09:00:00}
app.notifications.scheduler.cron=${NOTIFICATION_SCHEDULER_CRON:0 0 6 * * *}
app.notifications.scheduler.zone=${NOTIFICATION_SCHEDULER_ZONE:UTC}
app.notifications.retry.max-attempts=${NOTIFICATION_RETRY_MAX:3}
app.notifications.retry.timeout-seconds=${NOTIFICATION_RETRY_TIMEOUT_SECONDS:5}

# Firebase (if used)
app.notifications.firebase.project-id=${FIREBASE_PROJECT_ID:}
app.notifications.firebase.service-account-key-path=${FIREBASE_SERVICE_ACCOUNT_KEY:}

# -----------------------------
# Springdoc / Swagger
# -----------------------------
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# -----------------------------
# Actuator / observability
# -----------------------------
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=when_authorized
management.info.env.enabled=true

# -----------------------------
# Logging / request tracing
# -----------------------------
logging.level.root=${LOG_LEVEL:INFO}
logging.level.org.springframework.security=INFO
logging.level.com.goodthingjar=DEBUG
